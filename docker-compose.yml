version: '3.8'

services:
  # C++ Matching Engine
  matching-engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    ports:
      - "8080:8080"
    environment:
      - ENGINE_PORT=8080
      - ENGINE_THREADS=4
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - matching-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://matching-engine:8080/ws
      - NODE_ENV=production
    depends_on:
      matching-engine:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - matching-network

  # Optional: WebSocket Bridge for development/demo
  websocket-bridge:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./websocket-bridge.js:/app/websocket-bridge.js
    command: [ "node", "websocket-bridge.js" ]
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    networks:
      - matching-network

networks:
  matching-network:
    driver: bridge
